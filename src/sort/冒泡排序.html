<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>冒泡排序</title>
</head>
<body>
<script type="application/javascript">
    const arr = [2,3,4,6,7,3,2,4,6,8,1,1]
    const maoPao = function(arr) {
        for (let i = 0; i < arr.length - 1; i++) {
            for (let j = 0; j < arr.length - 1 - i; j++) {
                if (arr[j + 1] < arr[j]) {
                    [arr[j + 1], arr[j]] = [arr[j], arr[j + 1]]
                }
            }
        }
        return arr
    }
    console.log(maoPao(arr))
    
</script>
</body>
</html>
