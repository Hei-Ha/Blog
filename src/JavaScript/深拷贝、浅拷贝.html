    // ------------------

    const obj = {
        a: 1,
        b: 2,
        c: 'Hello'
    }
    obj.d = obj
    function deepClone(obj, map = new Map()){
        if(typeof obj === 'object'){
            let aNewObj = Array.isArray(obj) ? [] : {}
            if(map.get(obj)){
                return map.get(obj)
            }
            map.set(obj, aNewObj)
            for(let key in obj){
                aNewObj[key] = deepClone(obj[key], map)
            }
            return aNewObj
        } else {
            return obj
        }
    }
