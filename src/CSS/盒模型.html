<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>盒模型</title>
</head>

<style>
    #box_1 {
        box-sizing: content-box; /* 标准盒模型 默认值 */
        width: 100px;
        height: 100px;
        border: 5px solid #cccccc;
        padding: 20px;
        margin-bottom: 10px;
        background: red;
    }
    #box_2 {
        box-sizing: border-box;  /* IE 盒模型*/
        width: 100px;
        height: 100px;
        border: 5px solid #cccccc;
        padding: 20px;
        margin: 20px;
        background: blue;
    }
</style>

<body>
<div id="box_1"></div>
<div id="box_2"></div>
</body>
</html>
